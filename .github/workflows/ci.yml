name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: node ./scripts/build-package.mjs runtime core tooling postgres host deno node rest-collections otel bun

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Publish dry-run
        run: bun run publish:dry-run

  postgres:
    name: Postgres Integration
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: node ./scripts/build-package.mjs runtime core tooling postgres host deno node rest-collections otel bun

      - name: Postgres integration tests
        run: bun test tests/postgres.integration.test.ts

      - name: Schema sync tests
        run: bun test tests/schema.sync.test.ts

      - name: Deno runtime tests
        run: bun test tests/deno.runtime.test.ts
