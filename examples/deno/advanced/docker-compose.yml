services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chimpbase
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4318:4318"

  app:
    build:
      context: ../../..
      dockerfile: examples/deno/advanced/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/chimpbase
      CHIMPBASE_BOOTSTRAP_API_KEY: dev-bootstrap-key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: deno-advanced
      CHIMPBASE_WORKER_CONCURRENCY: "5"
      CHIMPBASE_WORKER_POLL_INTERVAL_MS: "500"
      PORT: "3000"
    ports:
      - "3000-3002:3000"
    deploy:
      replicas: 3
