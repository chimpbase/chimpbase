services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 2s
      timeout: 5s
      retries: 10

  factory-controller:
    build: .
    environment:
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory
      CHIMPBASE_STORAGE_ENGINE: postgres
      CHIMPBASE_SERVER_PORT: 3000
      CHIMPBASE_BOOTSTRAP_API_KEY: dev-bootstrap-key
      CHIMPBASE_WORKER_CONCURRENCY: 5
      CHIMPBASE_WORKER_POLL_INTERVAL_MS: 500
    ports:
      - "3000-3002:3000"
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
